<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Tasker</title>

<!-- PWA -->
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0e0f14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Tasker">

<!-- Apple touch icons (inline SVG as data URI) -->
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="apple-touch-startup-image" href="icon-512.png">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0e0f14;--surface:#16181f;--surface2:#1e2029;--border:rgba(255,255,255,0.07);--text:#f0f0f5;--muted:rgba(240,240,245,0.4);--accent:#5b8af5;--accent2:#a78bfa;--green:#34d399;--red:#f87171;--yellow:#fbbf24;--radius:14px;--font:'Lexend',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;min-height:-webkit-fill-available;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom)}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse 80% 60% at 10% 10%,rgba(91,138,245,0.07) 0%,transparent 60%),radial-gradient(ellipse 60% 50% at 90% 90%,rgba(167,139,250,0.06) 0%,transparent 60%)}


/* ── SETTINGS MODAL ─────────────────────────────────────────────────────── */
.settings-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.settings-overlay.open{display:flex}
.settings-sheet{background:var(--surface);border:1px solid var(--border);border-radius:24px 24px 0 0;padding:28px 24px 40px;width:100%;max-width:720px;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.settings-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 24px}
.settings-title{font-size:18px;font-weight:700;margin-bottom:6px}
.settings-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.settings-section-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:12px}

/* Theme presets */
.theme-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:28px}
.theme-swatch{border:2px solid transparent;border-radius:14px;padding:14px 10px;cursor:pointer;transition:all .2s;text-align:center;background:var(--surface2)}
.theme-swatch.active{border-color:var(--accent)}
.theme-swatch:hover{transform:translateY(-2px);border-color:rgba(255,255,255,.15)}
.theme-swatch-preview{width:100%;height:36px;border-radius:8px;margin-bottom:8px}
.theme-swatch-name{font-size:12px;font-weight:600}

/* Custom color pickers */
.custom-colors{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.color-row{display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border:1px solid var(--border);border-radius:12px;padding:12px 14px}
.color-row-label{font-size:13px;font-weight:500}
.color-row-right{display:flex;align-items:center;gap:10px}
.color-preview{width:28px;height:28px;border-radius:8px;border:2px solid rgba(255,255,255,.1)}
.color-input-wrap{position:relative;overflow:hidden;width:36px;height:36px;border-radius:10px;cursor:pointer}
.color-input-wrap input[type=color]{position:absolute;inset:-4px;width:calc(100%+8px);height:calc(100%+8px);border:none;cursor:pointer;opacity:0}
.color-input-wrap .color-btn{width:100%;height:100%;border:1.5px solid rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;pointer-events:none}
.settings-btn-row{display:flex;gap:10px}
.settings-close-btn{flex:1;font-family:var(--font);font-size:14px;font-weight:600;padding:13px;border-radius:12px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.settings-close-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.settings-reset-btn{font-family:var(--font);font-size:13px;font-weight:600;padding:13px 20px;border-radius:12px;border:none;background:rgba(248,113,113,.15);color:#f87171;cursor:pointer;transition:all .2s}
.settings-reset-btn:hover{background:rgba(248,113,113,.25)}

/* Settings gear button in header */
.settings-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-right:8px}
.settings-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text);transform:rotate(30deg)}


/* Owner filter tabs */
.owner-tabs{display:flex;gap:6px;margin-bottom:16px}
.owner-tab{flex:1;font-family:var(--font);font-size:13px;font-weight:600;padding:9px 10px;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s;text-align:center}
.owner-tab:hover{border-color:rgba(255,255,255,.18);color:var(--text)}
.owner-tab.active{color:#fff;border-color:transparent}
.owner-tab.mine.active{background:var(--accent)}
.owner-tab.others.active{background:#f472b6}
.owner-tab.common.active{background:#fbbf24;color:#000}

/* Assign toggle on add-meta */
.assign-toggle{display:flex;gap:6px;align-items:center}
.assign-btn{font-family:var(--font);font-size:12px;font-weight:600;padding:6px 12px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s}
.assign-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.assign-label{font-size:11px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:1px}

/* Task owner indicator */
.task-owner-tag{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;letter-spacing:.8px;margin-left:4px}
.task-owner-tag.mine{background:rgba(91,138,245,.2);color:var(--accent)}
.task-owner-tag.common{background:rgba(251,191,36,.2);color:#fbbf24}
.task-owner-tag.others{background:rgba(244,114,182,.2);color:#f472b6}


/* Edit task modal */
.edit-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.edit-overlay.open{display:flex}
.edit-modal{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:460px;animation:slideIn .2s ease}
.edit-modal-title{font-size:18px;font-weight:700;margin-bottom:22px;display:flex;align-items:center;justify-content:space-between}
.edit-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.edit-close:hover{background:var(--surface2);color:var(--text)}
.edit-field{margin-bottom:16px}
.edit-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;display:block}
.edit-input{width:100%;font-family:var(--font);font-size:15px;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);outline:none;transition:border-color .2s}
.edit-input:focus{border-color:rgba(91,138,245,.5)}
.edit-select{width:100%;font-family:var(--font);font-size:14px;padding:12px 14px;background:var(--surface2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);outline:none;transition:border-color .2s;cursor:pointer}
.edit-select:focus{border-color:rgba(91,138,245,.5)}
.edit-select option{background:var(--surface)}
.edit-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.edit-actions{display:flex;gap:10px;margin-top:24px}
.edit-actions .btn{flex:1;padding:13px;font-size:14px}
.edit-assign-row{display:flex;gap:8px;margin-top:6px}
.edit-assign-btn{flex:1;font-family:var(--font);font-size:13px;font-weight:600;padding:9px;border-radius:10px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .2s;text-align:center}
.edit-assign-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.edit-assign-btn.common.active{background:#fbbf24;border-color:#fbbf24;color:#000}


/* ── CALENDAR TAB ────────────────────────────────────────────────────────── */
.cal-view-toggle{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:20px}
.cal-view-btn{flex:1;font-family:var(--font);font-size:13px;font-weight:600;padding:8px;border:none;border-radius:9px;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted)}
.cal-view-btn.active{background:var(--accent);color:#fff}

/* Calendar nav */
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.cal-nav-title{font-size:18px;font-weight:700;letter-spacing:-.5px}
.cal-nav-btns{display:flex;gap:6px}
.cal-nav-btn{width:34px;height:34px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.cal-nav-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.cal-today-btn{font-family:var(--font);font-size:12px;font-weight:600;padding:7px 14px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s}
.cal-today-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── MONTH VIEW ── */
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.month-dow{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;padding:8px 0;margin-bottom:4px}
.month-day{min-height:80px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 6px;cursor:pointer;transition:all .2s;position:relative}
.month-day:hover{border-color:rgba(255,255,255,.15);background:var(--surface2)}
.month-day.today{border-color:var(--accent);background:rgba(91,138,245,.08)}
.month-day.other-month{opacity:.35}
.month-day.has-tasks{border-color:rgba(255,255,255,.12)}
.month-day-num{font-size:12px;font-weight:700;margin-bottom:5px;line-height:1}
.month-day.today .month-day-num{color:var(--accent)}
.month-task-dot{font-size:10px;font-weight:600;padding:2px 5px;border-radius:5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;cursor:pointer;transition:opacity .15s}
.month-task-dot:hover{opacity:.75}
.month-more{font-size:10px;color:var(--muted);font-weight:600;margin-top:2px}

/* ── WEEK VIEW ── */
.week-grid{display:grid;grid-template-columns:48px repeat(7,1fr);gap:0;border:1px solid var(--border);border-radius:14px;overflow:hidden}
.week-header-spacer{background:var(--surface2);border-bottom:1px solid var(--border)}
.week-day-header{background:var(--surface2);border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:10px 6px;text-align:center}
.week-day-header .dow{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.week-day-header .dnum{font-size:18px;font-weight:800;line-height:1;margin-top:2px}
.week-day-header.today .dnum{color:var(--accent)}
.week-time-col{background:var(--surface);border-right:1px solid var(--border)}
.week-time-label{height:52px;display:flex;align-items:flex-start;justify-content:flex-end;padding:4px 8px 0 0;font-size:10px;font-weight:600;color:var(--muted)}
.week-day-col{background:var(--surface);border-left:1px solid var(--border);position:relative;min-height:52px}
.week-day-col.today-col{background:rgba(91,138,245,.04)}
.week-hour-cell{height:52px;border-bottom:1px solid var(--border);position:relative}
.week-hour-cell:last-child{border-bottom:none}
.week-task-block{position:absolute;left:2px;right:2px;border-radius:6px;padding:3px 6px;font-size:10px;font-weight:600;cursor:pointer;overflow:hidden;z-index:2;line-height:1.3;transition:opacity .15s}
.week-task-block:hover{opacity:.8}
.week-allday-row{display:contents}
.week-allday-spacer{background:var(--surface2);border-bottom:1px solid var(--border);border-right:1px solid var(--border);padding:6px 4px;font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;justify-content:flex-end}
.week-allday-cell{background:var(--surface2);border-bottom:1px solid var(--border);border-left:1px solid var(--border);padding:4px;min-height:28px}
.week-allday-task{font-size:10px;font-weight:600;padding:2px 6px;border-radius:5px;margin-bottom:2px;cursor:pointer;transition:opacity .15s}
.week-allday-task:hover{opacity:.75}

/* ── AGENDA VIEW ── */
.agenda-list{display:flex;flex-direction:column;gap:0}
.agenda-day-group{margin-bottom:4px}
.agenda-day-header{display:flex;align-items:center;gap:12px;padding:14px 0 8px;position:sticky;top:0;background:var(--bg);z-index:1}
.agenda-day-circle{width:40px;height:40px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;background:var(--surface);border:1px solid var(--border)}
.agenda-day-circle.today{background:var(--accent);border-color:var(--accent)}
.agenda-day-circle .adm{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;opacity:.7;line-height:1}
.agenda-day-circle .add{font-size:16px;font-weight:800;line-height:1}
.agenda-day-label{font-size:14px;font-weight:700}
.agenda-day-label .aday{font-size:12px;color:var(--muted);font-weight:500;margin-top:1px}
.agenda-task-row{display:flex;align-items:center;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px;margin-left:52px;cursor:pointer;transition:all .2s}
.agenda-task-row:hover{border-color:rgba(255,255,255,.15);background:var(--surface2)}
.agenda-task-time{font-size:11px;font-weight:700;color:var(--muted);min-width:44px;text-align:right;flex-shrink:0}
.agenda-task-body{flex:1;min-width:0}
.agenda-task-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.agenda-task-title.done{text-decoration:line-through;color:var(--muted)}
.agenda-task-cat{font-size:11px;margin-top:2px}
.agenda-check{width:26px;height:26px;border-radius:8px;border:1.5px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;transition:all .2s}
.agenda-check.done{background:var(--green);border-color:var(--green);color:#fff}
.agenda-empty{text-align:center;padding:60px 20px;color:var(--muted)}
.agenda-empty-icon{font-size:40px;margin-bottom:12px}
.agenda-empty-text{font-size:15px;font-weight:600}
.agenda-empty-sub{font-size:13px;margin-top:4px;opacity:.6}

/* Task detail popup from calendar */
.cal-popup{position:fixed;z-index:400;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;min-width:240px;max-width:300px;box-shadow:0 20px 60px rgba(0,0,0,.5);animation:slideIn .15s ease}
.cal-popup-title{font-size:14px;font-weight:700;margin-bottom:8px}
.cal-popup-meta{font-size:12px;color:var(--muted);margin-bottom:12px;display:flex;flex-direction:column;gap:3px}
.cal-popup-actions{display:flex;gap:8px}
.cal-popup-actions .btn{flex:1;padding:9px;font-size:12px}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg)}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px;width:100%;max-width:360px;text-align:center}
.login-logo{font-size:42px;font-weight:800;letter-spacing:-2px;margin-bottom:6px;background:linear-gradient(135deg,var(--text) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.login-sub{font-size:14px;color:var(--muted);margin-bottom:32px}
.login-label{font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;text-align:left;margin-bottom:6px;display:block}
.login-input{width:100%;font-family:var(--font);font-size:15px;padding:13px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:12px;color:var(--text);outline:none;margin-bottom:20px;transition:border-color .2s}
.login-input:focus{border-color:rgba(91,138,245,.5)}
.login-btn{width:100%;font-family:var(--font);font-size:15px;font-weight:700;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#fff;cursor:pointer;transition:all .2s}
.login-btn:hover{background:#4a79e8;transform:translateY(-1px)}
.login-hint{font-size:12px;color:var(--muted);margin-top:16px}

/* APP */
.app{position:relative;z-index:1;max-width:720px;margin:0 auto;padding:0 16px calc(100px + env(safe-area-inset-bottom));display:none}
.header{padding:48px 0 28px;display:flex;align-items:flex-end;justify-content:space-between}
.logo{font-size:36px;font-weight:800;letter-spacing:-1.5px;background:linear-gradient(135deg,var(--text) 0%,var(--accent2) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.user-pill{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 14px 6px 8px}
.user-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.user-name{font-size:13px;font-weight:600}
.logout-btn{font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;margin-left:4px;font-family:var(--font);transition:color .2s}
.logout-btn:hover{color:var(--red)}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:24px}
.tab-btn{flex:1;font-family:var(--font);font-size:14px;font-weight:600;padding:10px;border:none;border-radius:9px;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted)}
.tab-btn.active{background:var(--accent);color:#fff}

.online-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;margin-bottom:20px;font-size:13px}
.online-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.online-text{color:var(--muted)}
.online-text strong{color:var(--text)}

.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center}
.stat-value{font-size:28px;font-weight:700;letter-spacing:-1px}
.stat-label{font-size:11px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.progress-bar{height:3px;background:var(--surface2);border-radius:99px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:99px;transition:width .4s ease}

.filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.filter-btn{flex-shrink:0;font-family:var(--font);font-size:13px;font-weight:500;padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;transition:all .2s}
.filter-btn:hover{border-color:rgba(255,255,255,.2);color:var(--text)}
.filter-btn.active{color:#000;border-color:transparent;font-weight:600}

.add-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:24px;transition:border-color .2s,box-shadow .2s}
.add-box:focus-within{border-color:rgba(91,138,245,.5);box-shadow:0 0 0 3px rgba(91,138,245,.08)}
.add-row{display:flex;gap:10px;align-items:center}
.add-input{flex:1;font-family:var(--font);font-size:15px;background:transparent;border:none;outline:none;color:var(--text)}
.add-input::placeholder{color:var(--muted)}
.add-meta{display:none;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);flex-wrap:wrap;align-items:center}
.add-meta.visible{display:flex}

<script>
const SURL='https://ckfamqwyrcjvsjrqnwfo.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNrZmFtcXd5cmNqdnNqcnFud2ZvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzM3MjcsImV4cCI6MjA4NzkwOTcyN30.UnW0b-uuv2yMfhKn8zh_4ibllXl51uK7JtpUREuyOkU';
const{createClient}=supabase;
const db=createClient(SURL,SKEY);

const CATS={Work:{color:'#5b8af5',bg:'rgba(91,138,245,0.15)',icon:'💼'},Personal:{color:'#34d399',bg:'rgba(52,211,153,0.15)',icon:'👤'},Urgent:{color:'#f87171',bg:'rgba(248,113,113,0.15)',icon:'🔥'},Meetings:{color:'#fbbf24',bg:'rgba(251,191,36,0.15)',icon:'👥'},Admin:{color:'#a78bfa',bg:'rgba(167,139,250,0.15)',icon:'📄'}};
const UCOLORS=['#5b8af5','#34d399','#f87171','#fbbf24','#a78bfa','#fb923c','#f472b6'];
const EMOJIS=['🛒','📦','🏠','🎉','💪','✈️','📚','🍔','💊','🎁','🔧','💻','🏋️','🌿','💰','🎯','🐾','🧹'];
const LIST_COLORS=['#5b8af5','#34d399','#f87171','#fbbf24','#a78bfa','#fb923c','#f472b6','#22d3ee'];

let tasks=[],sublists=[],sublistItems={},currentUser=null,currentFilter='all',ownerFilter='all',taskAssign='mine',showComp=true,dragSrc=null,selectedEmoji='🛒',currentTab='tasks',expandedLists=new Set(),collapsedLists=new Set();

function ucolor(n){let h=0;for(let c of n)h=c.charCodeAt(0)+((h<<5)-h);return UCOLORS[Math.abs(h)%UCOLORS.length]}
function lcolor(id){let h=0;for(let c of id)h=c.charCodeAt(0)+((h<<5)-h);return LIST_COLORS[Math.abs(h)%LIST_COLORS.length]}

// ── AUTH ──────────────────────────────────────────────────────────────────────
function login(){
  const name=document.getElementById('login-input').value.trim();
  if(!name)return;
  currentUser={name,color:ucolor(name)};
  localStorage.setItem('tasker_user',JSON.stringify(currentUser));
  showApp();
}
function logout(){
  localStorage.removeItem('tasker_user');currentUser=null;tasks=[];sublists=[];sublistItems={};
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-input').value='';
}
function showApp(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  const av=document.getElementById('user-avatar');
  av.textContent=currentUser.name[0].toUpperCase();av.style.background=currentUser.color;
  document.getElementById('user-name-label').textContent=currentUser.name;
  document.getElementById('due-input').min=new Date().toISOString().split('T')[0];
  loadTasks();loadSublists();subscribeAll();
}

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab){
  currentTab=tab;
  document.getElementById('tasks-tab').style.display=tab==='tasks'?'':'none';
  document.getElementById('sublists-tab').style.display=tab==='sublists'?'':'none';
  document.getElementById('calendar-tab').style.display=tab==='calendar'?'':'none';
  document.getElementById('tab-tasks').classList.toggle('active',tab==='tasks');
  document.getElementById('tab-sublists').classList.toggle('active',tab==='sublists');
  document.getElementById('tab-calendar').classList.toggle('active',tab==='calendar');
  if(tab==='calendar') renderCalendar();
}

// ── TASKS ─────────────────────────────────────────────────────────────────────
async function loadTasks(){
  const{data,error}=await db.from('tasks').select('*').order('position',{ascending:true}).order('created_at',{ascending:true});
  if(error){showToast('Error loading tasks');return;}
  tasks=data||[];renderTasks();
}
async function addTask(){
  const input=document.getElementById('add-input');
  const title=input.value.trim();if(!title)return;
  const cat=document.getElementById('cat-select').value;
  const due=document.getElementById('due-input').value;
  const time=document.getElementById('time-input').value;
  const maxPos=tasks.filter(t=>!t.done).reduce((m,t)=>Math.max(m,t.position||0),0);
  const dueFull=due?(time?due+'T'+time:due):null;
  const ttype=taskAssign==='common'?'common':'personal';
  const{error}=await db.from('tasks').insert({title,category:cat,due_date:dueFull||null,done:false,created_by:currentUser.name,position:maxPos+1,task_type:ttype});
  if(error){showToast('Error adding task');return;}
  input.value='';document.getElementById('due-input').value='';document.getElementById('time-input').value='';setAssign('mine');
  document.getElementById('add-btn').disabled=true;hideMeta();showToast('Task added ✓');
}
async function toggleDone(id){
  const t=tasks.find(t=>t.id===id);if(!t)return;
  await db.from('tasks').update({done:!t.done,completed_at:!t.done?new Date().toISOString():null}).eq('id',id);
  showToast(!t.done?'Task completed 🎉':'Task reopened');
}
async function deleteTask(id){
  await db.from('tasks').delete().eq('id',id);showToast('Task deleted');
}
async function moveUp(id){

async function moveDown(id){

// ── REALTIME ──────────────────────────────────────────────────────────────────
function subscribeAll(){
  // Tasks
  db.channel('tasks-rt').on('postgres_changes',{event:'*',schema:'public',table:'tasks'},p=>{
    const{eventType:et,new:nr,old:or}=p;
    if(et==='INSERT'){if(!tasks.find(t=>t.id===nr.id)){tasks.push(nr);if(nr.created_by!==currentUser.name)showToast(nr.created_by+' added: "'+nr.title+'"');}}
    else if(et==='UPDATE'){const i=tasks.findIndex(t=>t.id===nr.id);if(i>=0)tasks[i]=nr;}
    else if(et==='DELETE'){tasks=tasks.filter(t=>t.id!==or.id);}
    tasks.sort((a,b)=>(a.position||0)-(b.position||0));renderTasks();
  }).subscribe();

  // Sublists
  db.channel('sublists-rt').on('postgres_changes',{event:'*',schema:'public',table:'sublists'},p=>{
    const{eventType:et,new:nr,old:or}=p;
    if(et==='INSERT'){if(!sublists.find(s=>s.id===nr.id)){sublists.push(nr);if(nr.created_by!==currentUser.name)showToast(nr.created_by+' created list: "'+nr.title+'"');}}
    else if(et==='UPDATE'){const i=sublists.findIndex(s=>s.id===nr.id);if(i>=0)sublists[i]=nr;}
    else if(et==='DELETE'){sublists=sublists.filter(s=>s.id!==or.id);delete sublistItems[or.id];}
    renderSublists();
  }).subscribe();

  // Sublist items
  db.channel('sublist-items-rt').on('postgres_changes',{event:'*',schema:'public',table:'sublist_items'},p=>{
    const{eventType:et,new:nr,old:or}=p;
    if(et==='INSERT'){
      const sid=nr.sublist_id;
      if(!sublistItems[sid])sublistItems[sid]=[];
      if(!sublistItems[sid].find(i=>i.id===nr.id)){
        sublistItems[sid].push(nr);
        if(nr.created_by!==currentUser.name)showToast(nr.created_by+' added "'+nr.title+'"');
      }
    } else if(et==='UPDATE'){
      const sid=nr.sublist_id;
      if(!sublistItems[sid])sublistItems[sid]=[];
      const i=sublistItems[sid].findIndex(i=>i.id===nr.id);
      if(i>=0)sublistItems[sid][i]=nr;
      else sublistItems[sid].push(nr);
      if(nr.done&&nr.completed_by&&nr.completed_by!==currentUser.name)showToast(nr.completed_by+' checked off "'+nr.title+'"');
    } else if(et==='DELETE'){
      for(const sid in sublistItems)sublistItems[sid]=sublistItems[sid].filter(i=>i.id!==or.id);
    }
    renderSublists();
  }).subscribe();
}

function fmtDue(due){
  if(!due)return'';
  const hasTime=due.includes('T') && due.length>10;
  const today=new Date();today.setHours(0,0,0,0);
  const d=new Date(due+'T00:00:00');
  if(d<today)return'Overdue';
  const timeStr=hasTime?(' '+new Date(due).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})):'';
  if(d.getTime()===today.getTime())return'Today';
  const tom=new Date(today);tom.setDate(today.getDate()+1);
  if(d.getTime()===tom.getTime())return'Tomorrow';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
}

const THEMES = [
  { name:'Default',   accent:'#5b8af5', accent2:'#a78bfa', bg:'#0e0f14', surface:'#16181f' },
  { name:'Emerald',   accent:'#10b981', accent2:'#34d399', bg:'#0a0f0d', surface:'#111a14' },
  { name:'Sunset',    accent:'#f97316', accent2:'#fb923c', bg:'#120c08', surface:'#1c1108' },
  { name:'Rose',      accent:'#f43f5e', accent2:'#fb7185', bg:'#110810', surface:'#1c0f1c' },
  { name:'Gold',      accent:'#c9973a', accent2:'#e8b96a', bg:'#0e0c08', surface:'#181408' },
  { name:'Cyan',      accent:'#06b6d4', accent2:'#22d3ee', bg:'#080e10', surface:'#0e1618' },
  { name:'Violet',    accent:'#7c3aed', accent2:'#a78bfa', bg:'#0c0810', surface:'#140f1c' },
  { name:'Slate',     accent:'#94a3b8', accent2:'#cbd5e1', bg:'#0a0c10', surface:'#141720' },
];
const THEME_KEY = 'tasker_theme';

function applyTheme(theme, save=true) {
  const r = document.documentElement.style;
  r.setProperty('--accent',  theme.accent);
  r.setProperty('--accent2', theme.accent2);
  r.setProperty('--bg',      theme.bg);
  r.setProperty('--surface', theme.surface);
  // Derive surface2 by lightening surface slightly
  r.setProperty('--surface2', lighten(theme.surface, 8));
  // Update gradient bg
  document.body.style.setProperty('--grad1', theme.accent);
  document.body.style.setProperty('--grad2', theme.accent2);
  if (save) localStorage.setItem(THEME_KEY, JSON.stringify(theme));
  syncColorPickers(theme);
  renderThemeGrid(theme);
}

function lighten(hex, pct) {
  const n = parseInt(hex.replace('#',''), 16);
  const r = Math.min(255, (n>>16) + pct);
  const g = Math.min(255, ((n>>8)&0xff) + pct);
  const b = Math.min(255, (n&0xff) + pct);
  return '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

function applyCustomColor(key, val) {
  document.documentElement.style.setProperty('--'+key, val);
  const cur = getCurrentTheme();
  cur[key] = val;
  localStorage.setItem(THEME_KEY, JSON.stringify(cur));
  syncColorPickers(cur);
  renderThemeGrid(null); // deselect presets
}

function getCurrentTheme() {
  return {
    accent:  getComputedStyle(document.documentElement).getPropertyValue('--accent').trim(),
    accent2: getComputedStyle(document.documentElement).getPropertyValue('--accent2').trim(),
    bg:      getComputedStyle(document.documentElement).getPropertyValue('--bg').trim(),
    surface: getComputedStyle(document.documentElement).getPropertyValue('--surface').trim(),
  };
}

function syncColorPickers(theme) {
  const keys = ['accent','accent2','bg','surface'];
  keys.forEach(k => {
    const inp = document.getElementById('custom-'+k);
    const prev = document.getElementById('preview-'+k);
    if (inp) inp.value = theme[k] || '#000000';
    if (prev) prev.style.background = theme[k] || '#000000';
  });
}

function renderThemeGrid(activeTheme) {
  const grid = document.getElementById('theme-grid');
  if (!grid) return;
  grid.innerHTML = THEMES.map(t => {
    const isActive = activeTheme && t.accent === activeTheme.accent && t.bg === activeTheme.bg;
    return `<div class="theme-swatch ${isActive?'active':''}" onclick="applyTheme(${JSON.stringify(t)})">
      <div class="theme-swatch-preview" style="background:linear-gradient(135deg,${t.bg} 0%,${t.surface} 40%,${t.accent} 100%)"></div>
      <div class="theme-swatch-name">${t.name}</div>
    </div>`;
  }).join('');
}

function resetTheme() {
  localStorage.removeItem(THEME_KEY);
  applyTheme(THEMES[0]);
}

async function saveEditTask() {
  if (!editingTaskId) return;
  const title = document.getElementById('edit-title').value.trim();
  if (!title) { document.getElementById('edit-title').focus(); return; }

  const category = document.getElementById('edit-category').value;
  const date = document.getElementById('edit-date').value;
  const time = document.getElementById('edit-time').value;
  const dueFull = date ? (time ? date + 'T' + time : date) : null;
  const isCommon = document.getElementById('edit-assign-common').classList.contains('active');
  const task_type = isCommon ? 'common' : 'personal';

  const { error } = await db.from('tasks').update({
    title, category, due_date: dueFull, task_type
  }).eq('id', editingTaskId);

  if (error) { showToast('Error saving ✕'); return; }
  showToast('Task updated ✓');
  closeEditTask();
}


// ── CALENDAR ──────────────────────────────────────────────────────────────────
let calView = 'month';       // 'month' | 'week' | 'agenda'
let calDate = new Date();    // anchor date
const DAYS_SHORT  = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const MONTHS_LONG = ['January','February','March','April','May','June','July','August','September','October','November','December'];

function setCalView(v){
  calView = v;
  ['month','week','agenda'].forEach(x=>{
    document.getElementById('cvb-'+x).classList.toggle('active', x===v);
    document.getElementById('cal-'+x+'-view').style.display = x===v ? '' : 'none';
  });
  renderCalendar();
}

function calGoToday(){ calDate=new Date(); renderCalendar(); }
function calPrev(){
  if(calView==='month'){ calDate=new Date(calDate.getFullYear(), calDate.getMonth()-1, 1); }
  else if(calView==='week'){ calDate=new Date(calDate.getTime()-7*864e5); }
  else { calDate=new Date(calDate.getFullYear(), calDate.getMonth()-1, 1); }
  renderCalendar();
}
function calNext(){
  if(calView==='month'){ calDate=new Date(calDate.getFullYear(), calDate.getMonth()+1, 1); }
  else if(calView==='week'){ calDate=new Date(calDate.getTime()+7*864e5); }
  else { calDate=new Date(calDate.getFullYear(), calDate.getMonth()+1, 1); }
  renderCalendar();
}

function renderCalendar(){
  // Hide all, show current
  ['month','week','agenda'].forEach(x=>{
    const el = document.getElementById('cal-'+x+'-view');
    if(el) el.style.display = x===calView ? '' : 'none';
  });
  if(calView==='month')  renderMonth();
  if(calView==='week')   renderWeek();
  if(calView==='agenda') renderAgenda();
}

// ── helpers ───────────────────────────────────────────────────────────────────
function taskDateStr(t){ return t.due_date ? t.due_date.split('T')[0] : null; }
function taskTimeStr(t){
  if(!t.due_date || !t.due_date.includes('T')) return null;
  return t.due_date.split('T')[1].substring(0,5);
}
function fmtTime12(str){ // "14:30" -> "2:30 PM"
  if(!str) return '';
  const [h,m] = str.split(':').map(Number);
  const ap = h>=12?'PM':'AM', h12=h%12||12;
  return h12+':'+(m<10?'0':'')+m+' '+ap;
}
function isoDate(d){ return d.getFullYear()+'-'+(d.getMonth()<9?'0':'')+(d.getMonth()+1)+'-'+(d.getDate()<10?'0':'')+d.getDate(); }
function todayStr(){ return isoDate(new Date()); }
function getCatColor(cat){ return (CATS[cat]||CATS.Work).color; }
function getCatBg(cat){ return (CATS[cat]||CATS.Work).bg; }

// ── MONTH VIEW ────────────────────────────────────────────────────────────────
function renderMonth(){
  const y=calDate.getFullYear(), m=calDate.getMonth();
  document.getElementById('cal-nav-title').textContent = MONTHS_LONG[m]+' '+y;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();
  const today=todayStr();

  // Build task map by date
  const taskMap={};
  tasks.forEach(t=>{ const d=taskDateStr(t); if(d){(taskMap[d]=taskMap[d]||[]).push(t);} });

  let html='<div class="month-grid">';
  DAYS_SHORT.forEach(d=>html+=`<div class="month-dow">${d}</div>`);

  // Prev month days
  for(let i=firstDay-1;i>=0;i--){
    const day=daysInPrev-i, dStr=isoDate(new Date(y,m-1,day));
    html+=`<div class="month-day other-month" onclick="calClickDay('${dStr}')"><div class="month-day-num">${day}</div></div>`;
  }

  // Current month
  for(let d=1;d<=daysInMonth;d++){
    const dStr=isoDate(new Date(y,m,d));
    const isToday=dStr===today;
    const dayTasks=taskMap[dStr]||[];
    const visible=dayTasks.slice(0,3);
    const more=dayTasks.length-3;
    html+=`<div class="month-day ${isToday?'today':''} ${dayTasks.length?'has-tasks':''}" onclick="calClickDay('${dStr}')">`;
    html+=`<div class="month-day-num">${d}</div>`;
    visible.forEach(t=>{
      const col=getCatColor(t.category), bg=getCatBg(t.category);
      const done=t.done?'opacity:.4;text-decoration:line-through;':'';
      html+=`<div class="month-task-dot" style="color:${col};background:${bg};${done}" onclick="event.stopPropagation();calTaskClick(event,'${t.id}')" title="${esc(t.title)}">${esc(t.title)}</div>`;
    });
    if(more>0) html+=`<div class="month-more">+${more} more</div>`;
    html+='</div>';
  }

  // Next month padding
  const total=firstDay+daysInMonth;
  const nextDays=total%7===0?0:7-(total%7);
  for(let d=1;d<=nextDays;d++){
    const dStr=isoDate(new Date(y,m+1,d));
    html+=`<div class="month-day other-month" onclick="calClickDay('${dStr}')"><div class="month-day-num">${d}</div></div>`;
  }
  html+='</div>';
  document.getElementById('cal-month-view').innerHTML=html;
}

// ── WEEK VIEW ─────────────────────────────────────────────────────────────────
function renderWeek(){
  // Get start of week (Sunday)
  const d=new Date(calDate); d.setDate(d.getDate()-d.getDay());
  const days=[]; for(let i=0;i<7;i++){ const x=new Date(d); x.setDate(d.getDate()+i); days.push(x); }
  const today=todayStr();

  // Nav title
  const s=days[0], e=days[6];
  document.getElementById('cal-nav-title').textContent =
    MONTHS_LONG[s.getMonth()].slice(0,3)+' '+s.getDate()+' – '+
    (s.getMonth()!==e.getMonth()?MONTHS_LONG[e.getMonth()].slice(0,3)+' ':'')+e.getDate()+', '+e.getFullYear();

  // Map tasks by date
  const taskMap={};
  tasks.forEach(t=>{ const dstr=taskDateStr(t); if(dstr){(taskMap[dstr]=taskMap[dstr]||[]).push(t);} });

  const HOURS=Array.from({length:24},(_,i)=>i);
  let html='<div class="week-grid">';

  // Header row
  html+='<div class="week-header-spacer"></div>';
  days.forEach(day=>{
    const isToday=isoDate(day)===today;
    html+=`<div class="week-day-header ${isToday?'today':''}">
      <div class="dow">${DAYS_SHORT[day.getDay()]}</div>
      <div class="dnum">${day.getDate()}</div>
    </div>`;
  });

  // All-day row
  html+='<div class="week-allday-spacer">All day</div>';
  days.forEach(day=>{
    const dstr=isoDate(day);
    const isToday=dstr===today;
    const allDay=(taskMap[dstr]||[]).filter(t=>!taskTimeStr(t));
    html+=`<div class="week-allday-cell ${isToday?'today-col':''}">`;
    allDay.forEach(t=>{
      const col=getCatColor(t.category),bg=getCatBg(t.category);
      const done=t.done?'opacity:.4;text-decoration:line-through;':'';
      html+=`<div class="week-allday-task" style="color:${col};background:${bg};${done}" onclick="calTaskClick(event,'${t.id}')" title="${esc(t.title)}">${esc(t.title)}</div>`;
    });
    html+='</div>';
  });

  // Hour rows
  HOURS.forEach(h=>{
    const timeLabel=h===0?'12 AM':h<12?h+' AM':h===12?'12 PM':(h-12)+' PM';
    html+=`<div class="week-time-col"><div class="week-time-label">${timeLabel}</div></div>`;
    days.forEach(day=>{
      const dstr=isoDate(day);
      const isToday=dstr===today;
      const hourTasks=(taskMap[dstr]||[]).filter(t=>{
        const ts=taskTimeStr(t); if(!ts) return false;
        return parseInt(ts.split(':')[0])===h;
      });
      html+=`<div class="week-day-col ${isToday?'today-col':''}"><div class="week-hour-cell">`;
      hourTasks.forEach((t,i)=>{
        const col=getCatColor(t.category),bg=getCatBg(t.category);
        const ts=taskTimeStr(t)||'';
        const done=t.done?'opacity:.4;text-decoration:line-through;':'';
        const mins=ts?parseInt(ts.split(':')[1]):0;
        const top=Math.round(mins/60*52);
        html+=`<div class="week-task-block" style="color:${col};background:${bg};top:${top}px;left:${2+i*40}%;right:${2}%;${done}" onclick="calTaskClick(event,'${t.id}')">${fmtTime12(ts)} ${esc(t.title)}</div>`;
      });
      html+='</div></div>';
    });
  });

  html+='</div>';
  document.getElementById('cal-week-view').innerHTML=html;
}

// ── AGENDA VIEW ───────────────────────────────────────────────────────────────
function renderAgenda(){
  const today=todayStr();
  // Show 90 days ahead + 30 behind
  const start=new Date(); start.setDate(start.getDate()-30);
  const tasksWithDates=tasks.filter(t=>taskDateStr(t)).sort((a,b)=>(a.due_date||'').localeCompare(b.due_date||''));

  document.getElementById('cal-nav-title').textContent='Agenda';
  document.getElementById('cal-nav-btns') && (document.querySelector('.cal-nav-btns').style.display='none');

  if(!tasksWithDates.length){
    document.getElementById('cal-agenda-view').innerHTML=`
      <div class="agenda-empty">
        <div class="agenda-empty-icon">📅</div>
        <div class="agenda-empty-text">No scheduled tasks</div>
        <div class="agenda-empty-sub">Add a due date to tasks to see them here</div>
      </div>`;
    return;
  }

  // Group by date
  const groups={};
  tasksWithDates.forEach(t=>{ const d=taskDateStr(t); (groups[d]=groups[d]||[]).push(t); });
  const sortedDates=Object.keys(groups).sort();

  let html='<div class="agenda-list">';
  sortedDates.forEach(dstr=>{
    const dt=new Date(dstr+'T00:00:00');
    const isToday=dstr===today;
    const mon=MONTHS_LONG[dt.getMonth()].slice(0,3).toUpperCase();
    const dayNum=dt.getDate();
    const dayName=DAYS_SHORT[dt.getDay()];
    const fullDate=MONTHS_LONG[dt.getMonth()]+' '+dayNum+', '+dt.getFullYear();

    html+=`<div class="agenda-day-group">
      <div class="agenda-day-header">
        <div class="agenda-day-circle ${isToday?'today':''}">
          <div class="adm">${mon}</div>
          <div class="add">${dayNum}</div>
        </div>
        <div class="agenda-day-label">
          ${isToday?'<strong>Today</strong>':dayName}
          <div class="aday">${fullDate}</div>
        </div>
      </div>`;

    groups[dstr].forEach(t=>{
      const ts=taskTimeStr(t);
      const cat=CATS[t.category]||CATS.Work;
      const isMe=t.created_by===currentUser?.name;
      html+=`<div class="agenda-task-row" onclick="calTaskClick(event,'${t.id}')">
        <button class="agenda-check ${t.done?'done':''}" onclick="event.stopPropagation();toggleDone('${t.id}')">
          ${t.done?'✓':''}
        </button>
        <div class="agenda-task-time">${ts?fmtTime12(ts):'All day'}</div>
        <div class="agenda-task-body">
          <div class="agenda-task-title ${t.done?'done':''}">${esc(t.title)}</div>
          <div class="agenda-task-cat" style="color:${cat.color}">${cat.icon} ${t.category} · ${isMe?'You':esc(t.created_by||'?')}</div>
        </div>
      </div>`;
    });
    html+='</div>';
  });
  html+='</div>';
  document.getElementById('cal-agenda-view').innerHTML=html;
}

// ── TASK POPUP ────────────────────────────────────────────────────────────────
let calPopupEl=null;
function calTaskClick(e, id){
  e.stopPropagation();
  closeCalPopup();
  const t=tasks.find(x=>x.id===id); if(!t) return;
  const cat=CATS[t.category]||CATS.Work;
  const ts=taskTimeStr(t);
  const popup=document.createElement('div');
  popup.className='cal-popup';
  popup.innerHTML=`
    <div class="cal-popup-title">${esc(t.title)}</div>
    <div class="cal-popup-meta">
      <span style="color:${cat.color}">${cat.icon} ${t.category}</span>
      <span>📅 ${fmtDate(t.due_date)}${ts?' · '+fmtTime12(ts):''}</span>
      <span>👤 ${t.created_by===currentUser?.name?'You':esc(t.created_by||'?')}</span>
      ${t.done?'<span style="color:var(--green)">✓ Completed</span>':''}
    </div>
    <div class="cal-popup-actions">
      <button class="btn btn-ghost" style="padding:8px;font-size:12px" onclick="toggleDone('${id}');closeCalPopup();setTimeout(renderCalendar,300)">${t.done?'Reopen':'Complete'}</button>
      <button class="btn btn-primary" style="padding:8px;font-size:12px" onclick="closeCalPopup();openEditTask('${id}')">Edit</button>
    </div>`;
  // Position near click
  const x=Math.min(e.clientX, window.innerWidth-310);
  const y=Math.min(e.clientY+10, window.innerHeight-200);
  popup.style.cssText+=`;left:${x}px;top:${y}px`;
  document.body.appendChild(popup);
  calPopupEl=popup;
  setTimeout(()=>document.addEventListener('click',closeCalPopup,{once:true}),50);
}
function closeCalPopup(){ if(calPopupEl){calPopupEl.remove();calPopupEl=null;} }

function calClickDay(dstr){
  closeCalPopup();
  // Switch to week view on that day
  calDate=new Date(dstr+'T00:00:00');
  setCalView('week');
}

document.addEventListener('DOMContentLoaded',()=>{
  ['week','agenda'].forEach(x=>{
    const el=document.getElementById('cal-'+x+'-view');
    if(el) el.style.display='none';
  });
});
